spring.application.name=demo
app.api.base-url=http://localhost:8080

spring.datasource.url=jdbc:postgresql://localhost:5432/testdb
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
# org.postgresql.Driver 클래스를 통해 객체를 생성할 때
# jdbc:postgresql://localhost:5432/testdb로 접속하는데 이때 username=postgres, password=1234 를 사용하여 접속하는 객체를 하나 만든다.

mybatis.mapper-locations=classpath:mapper/**/*.xml

app.cookie.secure=false
app.cookie.same-site=Lax

app.jwt.secret=my-secret-key-my-secret-key-12345
# 60 * 60 * 1000
app.jwt.expiration-millis=3600000
